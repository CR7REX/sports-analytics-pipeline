name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest flake8
    
    - name: Lint with flake8
      run: |
        flake8 dags/ --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Test DAG syntax
      run: |
        python -m py_compile dags/football_data_etl.py
    
    - name: Test dbt compilation
      run: |
        cd dbt
        dbt deps
        dbt compile
      env:
        DBT_PROFILES_DIR: ./
        # Use dummy postgres connection for compile
        PG_HOST: localhost
        PG_PORT: 5432
